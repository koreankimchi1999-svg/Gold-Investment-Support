name: Gold Bot Daily Run
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install yfinance pandas_datareader requests
      - name: Run script
        env:
          gold: ${{ secrets.gold }} 
        run: python gold_bot.py
