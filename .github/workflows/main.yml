name: Gold Bot Daily Run

on:
  schedule:
    # 매일 한국 시간 아침 8시 30분 (UTC 23:30)에 실행
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install yfinance pandas_datareader requests
      - name: Run script
        env:
          gold: ${{ secrets.gold }} 
        run: python gold_bot.py
